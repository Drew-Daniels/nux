name: Bug report
description: Report unexpected behavior or a crash
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please redact secrets from config snippets and logs.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: nux version
      description: Output of `nux version`
      placeholder: e.g. nux 0.1.0 (commit abc1234, built 2026-01-01)
    validations:
      required: true

  - type: input
    id: tmux
    attributes:
      label: tmux version
      description: Output of `tmux -V`
      placeholder: e.g. tmux 3.4
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands or actions that trigger the issue
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: nux doctor output (optional)
      description: Paste output of `nux doctor` if it helps
      render: shell

  - type: textarea
    id: config
    attributes:
      label: Config snippet (optional)
      description: Minimal YAML that reproduces the issue. Redact secrets.
      render: yaml
