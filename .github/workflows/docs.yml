name: Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - run: |
          wget -qO- https://github.com/gohugoio/hugo/releases/latest/download/hugo_extended_Linux-64bit.tar.gz | sudo tar xz -C /usr/local/bin hugo
          hugo version
      - run: hugo --minify
        working-directory: docs
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/public
      - id: deployment
        uses: actions/deploy-pages@v5
