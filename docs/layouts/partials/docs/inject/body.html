<script>
(function () {
  // ── Copy button on code blocks ──
  document.querySelectorAll('.markdown pre > code').forEach(function (codeBlock) {
    var pre = codeBlock.parentElement;
    if (pre.querySelector('.nux-copy-btn')) return;

    var btn = document.createElement('button');
    btn.className = 'nux-copy-btn';
    btn.setAttribute('aria-label', 'Copy code');
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

    btn.addEventListener('click', function () {
      var text = codeBlock.textContent;
      navigator.clipboard.writeText(text).then(function () {
        btn.classList.add('copied');
        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        setTimeout(function () {
          btn.classList.remove('copied');
          btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
        }, 2000);
      });
    });

    pre.appendChild(btn);
  });

  // ── ToC scroll spy ──
  var tocLinks = document.querySelectorAll('.book-toc nav a');
  if (tocLinks.length === 0) return;

  var headings = [];
  tocLinks.forEach(function (link) {
    var id = link.getAttribute('href');
    if (id && id.startsWith('#')) {
      var el = document.getElementById(id.slice(1));
      if (el) headings.push({ el: el, link: link });
    }
  });

  if (headings.length === 0) return;

  var current = null;

  function updateSpy() {
    var scrollY = window.scrollY + 100;
    var active = null;

    for (var i = headings.length - 1; i >= 0; i--) {
      if (headings[i].el.offsetTop <= scrollY) {
        active = headings[i];
        break;
      }
    }

    if (active !== current) {
      if (current) current.link.classList.remove('active');
      if (active) active.link.classList.add('active');
      current = active;
    }
  }

  var ticking = false;
  window.addEventListener('scroll', function () {
    if (!ticking) {
      window.requestAnimationFrame(function () {
        updateSpy();
        ticking = false;
      });
      ticking = true;
    }
  });
  updateSpy();
})();
</script>
