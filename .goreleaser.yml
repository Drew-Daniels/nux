version: 2
project_name: nux
before:
  hooks:
    - go mod tidy
builds:
  - main: .
    binary: nux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Drew-Daniels/nux/cmd.Version={{.Version}}
      - -X github.com/Drew-Daniels/nux/cmd.Commit={{.Commit}}
      - -X github.com/Drew-Daniels/nux/cmd.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: Drew-Daniels
      name: homebrew-tap
    homepage: https://github.com/Drew-Daniels/nux
    description: A modern tmux session manager
    license: MIT
    install: |
      bin.install "nux"
    test: |
      system "#{bin}/nux", "version"

nfpms:
  - homepage: https://github.com/Drew-Daniels/nux
    maintainer: Drew Daniels
    description: A modern tmux session manager
    license: MIT
    formats:
      - deb
      - rpm
      - apk
